# Deployment profile: Tourism
# Travel, destinations, packages, properties (legacy catalog-items / listings)
id: tourism
label: Tourism
description: Destinations, packages, properties, and services. Travel-friendly user labels.

core: [cms, builder, seo, media, localization, leads]
capabilities: [search, ai]
experience: [entities, templates, collections]
presets: [destination, property, service, product]
modules: []

# Profile-specific label overrides (see admin-nav-manifest label_aliases)
label_overrides:
  packages: Packages      # preset destination
  properties: Properties  # preset property

admin:
  groups: [dashboard, content, media, marketing, design, seo, settings]
  items:
    dashboard: [dashboard]
    content:
      - pages
      - blog
      - packages
      - properties
      - services
      - products
      - collections
      - gallery
      - faqs
      - testimonials
    media: [media-library]
    marketing: [form-templates, form-submissions, inquiries, newsletter]
    design:
      - studio
      - header
      - footer
      - theme
      - announcement-bar
      - whatsapp
    seo: [seo-overview, seo-redirects, seo-robots, seo-structured-data]
    settings:
      - languages
      - translations
      - site-access
      - search-settings
      - admin-account
      - company-info
