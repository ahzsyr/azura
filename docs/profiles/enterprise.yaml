# Deployment profile: Enterprise
# Full platform — all presets and optional modules
id: enterprise
label: Enterprise
description: Full AZURA surface — all presets, modules, capabilities, and system tools.

core: [cms, builder, seo, media, localization, leads]
capabilities: [search, workflow, versioning, ai, personalization, analytics]
experience: [entities, templates, collections]
