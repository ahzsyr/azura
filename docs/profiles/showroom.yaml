# Deployment profile: Showroom
# Product / service showcase without commerce
id: showroom
label: Product Showroom
description: Marketing plus product showcase, collections, search, personalization.

core: [cms, builder, seo, media, localization, leads]
capabilities: [search, ai, personalization]
experience: [entities, templates, collections]
presets: [product, service]
modules: []

admin:
