    content:
      - pages
      - blog
      - products
      - services
      - collections
      - brands-tags
      - gallery
      - faqs
      - testimonials
      - partners
    media: [media-library]
    marketing: [form-templates, form-submissions, inquiries, newsletter]
    design:
      - studio
      - header
      - footer
      - theme
      - personalization
      - preloader
      - announcement-bar
      - popups
      - whatsapp
    seo: [seo-overview, seo-redirects, seo-robots, seo-structured-data]
    settings:
      - languages
      - translations
      - site-access
      - search-settings
      - admin-account
      - customer-accounts
      - visitor-portal
      - company-info
