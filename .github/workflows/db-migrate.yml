name: Database migrate

on:
  push:
    branches: [main, master]
    paths:
      - "prisma/**"
      - "database/postgres/**"
      - "scripts/deploy/prisma-migrate-deploy.mjs"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply schema patches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_SCHEMA: ${{ secrets.PRISMA_SCHEMA }}

      - name: Apply migrations / patches
        run: npm run db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_SCHEMA: ${{ secrets.PRISMA_SCHEMA }}
          # GitHub Actions is not Vercel — always run when secrets are set
          RUN_DB_MIGRATE_ON_PREVIEW: "1"
